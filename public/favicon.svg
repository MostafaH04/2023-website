<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Mostafa Hussein</title>
  <style>
    .background { fill: #07131f; }
    .frame { fill: none; stroke: #4fc6b4; }
    .latin { fill: #f5f7f8; }

    @media (prefers-color-scheme: light) {
      .background { fill: #fff8e8; }
