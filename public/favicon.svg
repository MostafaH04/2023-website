    }
  </style>
  <rect class="background" width="64" height="64" rx="16" />
  <rect class="frame" x="5" y="5" width="54" height="54" rx="13" stroke-opacity=".7" stroke-width="2" />
  <text class="latin" x="32" y="47" font-family="Alexandria, Arial, sans-serif" font-size="40" font-weight="850" text-anchor="middle">M</text>
</svg>
